<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting Room</title>
    <style>
      body {
        background-color: #f5f6fa;
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .card {
        background: white;
        padding: 40px 30px;
        border-radius: 16px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 300px;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 10px;
        color: #000;
      }

      h3 {
        font-size: 1.2rem;
        font-weight: normal;
        margin-bottom: 30px;
        color: #333;
      }

      .loader {
        border: 6px solid #e0e0e0;
        border-top: 6px solid #333;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <script src="waiting.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>Hi Player!</h1>
      <h3>Waiting for an opponent to join...</h3>
      <div class="loader"></div>
    </div>
  </body>
</html>
