<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="script.js"></script>
    <link rel="stylesheet" href="tic_tac_toe_style.css" />
  </head>
  <body>
    <h1 id="heading">Tic Tac Toe</h1>
    <h3>Current Player...</h3>
    <p id="player-name"></p>
    <div class="board">
      <div class="child" id="0,0"></div>
      <div class="child" id="0,1"></div>
      <div class="child" id="0,2"></div>
      <div class="child" id="1,0"></div>
      <div class="child" id="1,1"></div>
      <div class="child" id="1,2"></div>
      <div class="child" id="2,0"></div>
      <div class="child" id="2,1"></div>
      <div class="child" id="2,2"></div>
    </div>
  </body>
</html>
